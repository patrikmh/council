services:
  - type: web
    name: rabble
    env: docker
    plan: standard  # Playwright/Chromium wants ~1 GB RAM
    dockerfilePath: ./Dockerfile
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: ROUNDTABLE_PANEL
        sync: false
      - key: FRAMER_MODEL
        sync: false
      - key: DEBATE_ROUNDS
        value: "2"
      - key: PANELIST_TIMEOUT_SEC
        value: "60"
      - key: PUBLIC_FEED
        value: "1"
      - key: RABBLE_DB_PATH
        value: /var/data/rabble.db
      - key: RABBLE_LOG_LEVEL
        value: INFO
    disk:
      name: rabble-data
      mountPath: /var/data
      sizeGB: 1
