services:
  - type: web
    name: rabble
    env: python
    plan: standard  # Playwright needs ~1GB
    buildCommand: |
      pip install -r backend/requirements.txt
      playwright install --with-deps chromium
      cd frontend && npm ci && npm run build
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --app-dir backend
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: ROUNDTABLE_PANEL
        sync: false
      - key: FRAMER_MODEL
        sync: false
      - key: DEBATE_ROUNDS
        value: "2"
      - key: PUBLIC_FEED
        value: "1"
      - key: RABBLE_DB_PATH
        value: /var/data/rabble.db
      - key: PYTHONUNBUFFERED
        value: "1"
    disk:
      name: rabble-data
      mountPath: /var/data
      sizeGB: 1
